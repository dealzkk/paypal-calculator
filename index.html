<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Express Estimate Tool</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden; 
      background-color: #f8f9fa;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: #1c1e21;
    }

    .app-wrapper {
      height: 100vh;
      padding: 10px;
      display: flex;
      justify-content: center;
    }

    .tool-column {
      height: 100%;
      display: flex;
      flex-direction: column;
      max-width: 400px; /* Narrower for small screens */
      width: 100%;
    }

    .tool-card {
      background: #ffffff;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #dee2e6;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    .section-title {
      font-weight: 700;
      color: #003087;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
    }

    .form-label {
      font-weight: 600;
      color: #6c757d;
      font-size: 0.75rem;
      margin-bottom: 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .form-control, .form-select {
      border-radius: 8px;
      padding: 12px;
      border: 1px solid #ced4da;
      font-size: 1rem; /* Larger font for easier tapping */
    }

    /* STACKED SUMMARY LAYOUT */
    .calc-summary-stack {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin: 15px 0;
    }

    .summary-box {
      padding: 12px 15px;
      border-radius: 8px;
      background: #f8f9fa;
      border: 1px solid #e9ecef;
      display: flex;
      justify-content: space-between; /* Label left, Value right */
      align-items: center;
    }

    .summary-box .data-label { 
      font-size: 0.75rem; 
      font-weight: 600;
      color: #6c757d;
    }
    
    .summary-box .data-value { 
      font-size: 1rem; 
      font-weight: 700;
    }

    .summary-highlight { 
      background: #f0f7ff; 
      border-color: #cfe2ff; 
    }

    .peso-display {
      background-color: #f0f7ff;
      border: 1px solid #cfe2ff;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-top: auto; /* Pushes total to the bottom */
    }

    .peso-total { font-size: 2.4rem; font-weight: 800; color: #0070ba; }
    .hidden { display: none; }
    hr { border-color: #edf2f7; margin: 15px 0; }

    @media (max-width: 991px) {
      html, body { overflow-y: auto; }
      .app-wrapper { height: auto; }
      .tool-column { height: auto; }
    }
  </style>
</head>
<body>

  <div class="app-wrapper">
    <div class="tool-column">
      <div class="tool-card">
        <label class="form-label">Item Price (JPY)</label>
        <div class="input-group mb-3">
          <span class="input-group-text bg-light border-end-0">¥</span>
          <input type="number" id="calc_price" class="form-control border-start-0" placeholder="0" oninput="runCalc()">
        </div>

        <label class="form-label">Shipping Fee</label>
        <select id="calc_ship_select" class="form-select mb-3" onchange="toggleCustomShip()">
          <option value="0">Select option...</option>
          <optgroup label="Mobile/Tablet">
            <option value="1900">1-2 Phone No Box (¥1,900)</option>
            <option value="2800">1-2 Phone w/ Box (¥2,800)</option>
            <option value="4800">1-2 Tablet (¥4,800)</option>
          </optgroup>
          <optgroup label="Laptop">
            <option value="4800">Standard Laptop (¥4,800)</option>
            <option value="7800">Gaming/2 Standard Laptop (¥7,800)</option>
          </optgroup>
          <option value="custom">Custom Amount...</option>
        </select>

        <div id="calc_custom_div" class="mb-3 hidden">
          <label class="form-label text-muted">Custom JPY Amount</label>
          <input type="number" id="calc_custom_val" class="form-control" oninput="runCalc()">
        </div>

        <div class="calc-summary-stack">
          <div class="summary-box">
            <span class="data-label">Subtotal</span>
            <span class="data-value" id="res_subtotal">¥0</span>
          </div>
          <div class="summary-box">
            <span class="data-label">Fee (5%)</span>
            <span class="data-value" id="res_fee">¥0</span>
          </div>
          <div class="summary-box summary-highlight">
            <span class="data-label" style="color:#0070ba;">TOTAL JPY</span>
            <span class="data-value" id="res_yen" style="color:#0070ba;">¥0</span>
          </div>
        </div>

        <div class="peso-display">
          <div class="form-label" style="color: #0070ba;">Estimated Grand Total</div>
          <div class="peso-total" id="res_php">₱0.00</div>
          <div class="text-muted small mt-1">Converted at 0.4 Rate</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function toggleCustomShip() {
      const v = document.getElementById('calc_ship_select').value;
      document.getElementById('calc_custom_div').className = (v === 'custom' ? 'mb-3' : 'hidden');
      runCalc();
    }
    
    function runCalc() {
      let p = parseFloat(document.getElementById('calc_price').value) || 0;
      let sV = document.getElementById('calc_ship_select').value;
      let s = sV === 'custom' ? (parseFloat(document.getElementById('calc_custom_val').value) || 0) : parseFloat(sV);
      
      let subtotal = p + s;
      let f = subtotal * 0.05;
      let ty = subtotal + f;
      
      document.getElementById('res_fee').innerText = '¥' + Math.round(f).toLocaleString();
      document.getElementById('res_subtotal').innerText = '¥' + subtotal.toLocaleString();
      document.getElementById('res_yen').innerText = '¥' + Math.round(ty).toLocaleString();
      document.getElementById('res_php').innerText = '₱' + (ty * 0.4).toLocaleString(undefined, {minimumFractionDigits:2});
    }
  </script>
</body>
</html>
